<div class="card h-100 shadow-sm">
    <a href="/card/{{ card.id }}" class="text-decoration-none text-dark">
        {% if card.image_small %}<img data-card-image src="{{ card.image_small }}/low.webp" class="card-img-top p-2" style="height:250px; object-fit:contain;" alt="{{ card.name }}">{% else %}<div class="text-center text-muted p-5">No Image</div>{% endif %}
    </a>
    <div class="card-body d-flex flex-column">
        <a href="/card/{{ card.id }}" class="text-decoration-none text-dark"><h6 class="card-title mb-1">{{ card.number }} - {{ card.name }}</h6></a>
        <small class="text-muted">{{ card.category }}{% if card.hp %}<br>HP {{ card.hp }}{% endif %}{% if card.rarity %}<br>{{ card.rarity }}{% endif %}</small>
        <div class="mt-auto pt-3">
            {% if card.owned == 0 %}
            <button class="btn btn-success w-100" data-collection-action="open" data-card-id="{{ card.id }}" data-card-name="{{ card.name }}">➕ Add to Collection</button>
            {% else %}
            <div class="text-center mb-2"><span class="badge bg-success fs-6">✓ Owned</span></div>
            <div class="input-group"><button class="btn btn-outline-danger" data-collection-action="remove" data-card-id="{{ card.id }}">−</button><span id="count-{{ card.id }}" class="form-control text-center">{{ card.owned }}</span><button class="btn btn-outline-success" data-collection-action="open" data-card-id="{{ card.id }}" data-card-name="{{ card.name }}">+</button></div>
            {% endif %}
            <button class="btn btn-outline-secondary btn-sm w-100 mt-2" data-collection-action="open" data-card-id="{{ card.id }}" data-card-name="{{ card.name }}">{% if card.owned == 0 %}Add with details{% else %}Edit collection details{% endif %}</button>
        </div>
    </div>
</div>
